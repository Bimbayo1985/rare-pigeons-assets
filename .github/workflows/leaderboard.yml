name: Build Leaderboard

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Init npm
        run: npm init -y

      - name: Install dependencies
        run: npm install axios@1.6.8 cheerio@1.0.0-rc.12

      - name: Run generator
        run: node generate.js

      - name: Commit leaderboard
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add leaderboard.json
          git commit -m "update leaderboard" || echo "no changes"
         git pull --rebase
         git push
